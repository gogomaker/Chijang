name: Build Android APK

# 워크플로우를 실행할 조건 설정
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # GitHub 웹페이지에서 수동으로 실행할 수 있게 해주는 옵션

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest # 최신 우분투 환경에서 실행

    steps:
      # 1. GitHub 저장소의 코드를 가상 환경으로 가져옴
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 안드로이드 빌드에 필요한 Java(JDK) 환경 설정 (최신 안드로이드는 주로 Java 17 사용)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # 빌드 속도 향상을 위한 캐시 설정

      # 3. gradlew 실행 권한 부여 (Linux/Mac 환경 빌드 시 필수)
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4. Debug APK 빌드 실행
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. 생성된 APK 파일을 GitHub Artifacts로 업로드 (다운로드 가능하도록)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          # 프로젝트 구조에 따라 경로가 다를 수 있으므로 확인 필요 (기본값)
          path: app/build/outputs/apk/debug/app-debug.apk
