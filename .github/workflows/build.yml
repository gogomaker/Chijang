name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper
      # 시스템 gradle을 사용해 최신 안드로이드 프로젝트에 맞는 gradlew 파일을 즉석에서 생성합니다.
      run: gradle wrapper --gradle-version 8.7

    - name: Grant execute permission for gradlew
      # 생성된 파일에 실행 권한을 부여합니다.
      run: chmod +x gradlew

    - name: Build Debug APK
      # 생성된 gradlew를 사용하며, AWT 관련 UI 충돌 에러를 막기 위해 headless 옵션을 추가합니다.
      run: ./gradlew assembleDebug -Djava.awt.headless=true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

